name: generate contribution assets

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  snake:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Generate snake assets
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark

      - name: Upload snake artifacts
        uses: actions/upload-artifact@v4
        with:
          name: snake-assets
          path: dist/

  pacman:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Generate pacman assets
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: ${{ github.repository_owner }}

      - name: Upload pacman artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pacman-assets
          path: dist/

  publish:
    runs-on: ubuntu-latest
    needs: [snake, pacman]
    permissions:
      contents: write

    steps:
      - name: Download snake artifacts
        uses: actions/download-artifact@v4
        with:
          name: snake-assets
          path: dist

      - name: Download pacman artifacts
        uses: actions/download-artifact@v4
        with:
          name: pacman-assets
          path: dist

      - name: Publish all assets to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
